<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Planet Star — Bewegungs-Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060d1f;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;
  padding:8px 18px;border-radius:999px;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:rgba(255,255,255,0.85);font:13px/1.3 -apple-system,system-ui,sans-serif;text-align:center;
  pointer-events:none}
#hint{position:fixed;bottom:max(16px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:10;
  padding:8px 16px;border-radius:999px;
  background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.5);font:12px/1.3 -apple-system,system-ui,sans-serif;text-align:center;
  pointer-events:none;transition:opacity 2s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="hint">Bewege den Punkt mit Finger oder Maus</div>

<script>
(() => {
"use strict";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hudEl = document.getElementById("hud");
const hintEl = document.getElementById("hint");

// --- Resize ---
let W = 0, H = 0, DPR = 1;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  DPR = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize, { passive: true });
resize();

// --- Stars background ---
const bgStars = [];
function buildBgStars() {
  bgStars.length = 0;
  const count = Math.max(120, Math.min(500, Math.round(W * H * 0.0005)));
  for (let i = 0; i < count; i++) {
    const t = Math.random();
    const r = t < 0.8 ? 0.5 + Math.random() * 0.7 : 1.2 + Math.random() * 1.0;
    bgStars.push({ x: Math.random() * W, y: Math.random() * H, r, a: 0.15 + Math.random() * 0.6 });
  }
}
buildBgStars();
window.addEventListener("resize", buildBgStars, { passive: true });

function drawBgStars() {
  ctx.save();
  ctx.fillStyle = "#fff";
  for (const s of bgStars) {
    ctx.globalAlpha = s.a;
    if (s.r < 1) ctx.fillRect(s.x, s.y, 1, 1);
    else { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
  }
  ctx.restore();
}

// --- Helpers ---
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }
function fillCircle(x, y, r, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
}

// --- Player ---
const player = { x: W * 0.5, y: H * 0.6, tx: W * 0.5, ty: H * 0.6, vx: 0, vy: 0, r: 13 };

// --- Planets (orbital paths) ---
const PLANET_COUNT = 8;
let planets = [];
let eaten = 0;

function createPlanets() {
  planets = [];
  eaten = 0;
  const cx = W * 0.5, cy = H * 0.45;

  for (let i = 0; i < PLANET_COUNT; i++) {
    // Each planet orbits around a random center point
    const orbitCx = rand(W * 0.15, W * 0.85);
    const orbitCy = rand(H * 0.15, H * 0.75);
    const orbitRx = rand(30, 120); // ellipse width
    const orbitRy = rand(20, 90);  // ellipse height
    const speed = rand(0.15, 0.45); // radians per second — slow and calm
    const phase = rand(0, Math.PI * 2);
    const r = rand(5.5, 11);

    planets.push({
      orbitCx, orbitCy, orbitRx, orbitRy,
      speed, phase, r,
      x: 0, y: 0,
      fadeOut: 0, // 0 = visible, goes to 1 when eaten
      alive: true,
    });
  }
  updatePlanetPositions(0);
}

function updatePlanetPositions(dt) {
  for (const p of planets) {
    if (!p.alive) continue;
    p.phase += p.speed * dt;
    p.x = p.orbitCx + Math.cos(p.phase) * p.orbitRx;
    p.y = p.orbitCy + Math.sin(p.phase) * p.orbitRy;
  }
}

// --- Star (shy animal behavior) ---
let star = null;
let starTrail = [];
const STAR_TRAIL_LIFE = 22;
const STAR_TRAIL_MAX = 60;

function createStar() {
  star = {
    x: rand(W * 0.2, W * 0.8),
    y: rand(H * 0.2, H * 0.6),
    r: 10,
    vx: 0, vy: 0,
    t: 0, // rotation
    caught: false,
  };
  starTrail = [];
}

function updateStar(dt) {
  if (!star || star.caught) return;

  const d = dist(player.x, player.y, star.x, star.y);
  const safeDistance = 160; // comfortable distance
  const fleeStart = 240;   // starts reacting at this distance

  // --- "Shy animal" philosophy ---
  // Always gently drifts (like floating in water)
  // When player approaches: flows away smoothly, proportional to closeness
  // Never panics, never dashes — just graceful evasion

  // Gentle ambient drift (figure-8 like wandering)
  const wanderX = Math.sin(star.t * 0.7) * 15 + Math.cos(star.t * 0.3) * 10;
  const wanderY = Math.cos(star.t * 0.5) * 12 + Math.sin(star.t * 0.9) * 8;

  let fleeX = 0, fleeY = 0;

  if (d < fleeStart && d > 0.1) {
    // Smooth flee: stronger when closer, but never abrupt
    const closeness = 1 - (d / fleeStart); // 0 at edge, 1 at center
    const fleeStrength = closeness * closeness * 320; // quadratic — gentle at distance, firm up close

    const dx = star.x - player.x;
    const dy = star.y - player.y;
    const inv = 1 / Math.max(1, Math.hypot(dx, dy));

    fleeX = dx * inv * fleeStrength;
    fleeY = dy * inv * fleeStrength;

    // Add perpendicular component (makes it curve away, not just go straight back)
    const perpX = -dy * inv;
    const perpY = dx * inv;
    const sideAmount = Math.sin(star.t * 1.8) * closeness * 90;
    fleeX += perpX * sideAmount;
    fleeY += perpY * sideAmount;
  }

  // Center pull (prevent going off-screen, very gentle)
  const centerX = (W * 0.5 - star.x) * 0.3;
  const centerY = (H * 0.4 - star.y) * 0.3;

  // Wall avoidance (soft)
  let wallX = 0, wallY = 0;
  const wallZone = 80;
  const pad = star.r + 10;
  if (star.x < pad + wallZone) wallX = (1 - (star.x - pad) / wallZone) * 200;
  if (star.x > W - pad - wallZone) wallX = -(1 - (W - pad - star.x) / wallZone) * 200;
  if (star.y < pad + wallZone) wallY = (1 - (star.y - pad) / wallZone) * 200;
  if (star.y > H - pad - wallZone) wallY = -(1 - (H - pad - star.y) / wallZone) * 200;

  // Acceleration
  const ax = wanderX + fleeX + centerX + wallX;
  const ay = wanderY + fleeY + centerY + wallY;

  star.vx += ax * dt;
  star.vy += ay * dt;

  // Damping — makes it feel like moving through water
  const damp = Math.exp(-3.5 * dt);
  star.vx *= damp;
  star.vy *= damp;

  // Speed cap — never faster than 1.5x player feel
  const maxSpeed = 280;
  const sp = Math.hypot(star.vx, star.vy);
  if (sp > maxSpeed) {
    star.vx *= maxSpeed / sp;
    star.vy *= maxSpeed / sp;
  }

  star.x += star.vx * dt;
  star.y += star.vy * dt;

  // Hard bounds
  star.x = clamp(star.x, pad, W - pad);
  star.y = clamp(star.y, pad, H - pad);

  star.t += dt;

  // Trail particles
  if (sp > 30) {
    starTrail.push({
      x: star.x + rand(-star.r * 0.2, star.r * 0.2),
      y: star.y + rand(-star.r * 0.2, star.r * 0.2),
      r: rand(1.5, 3.5),
      life: STAR_TRAIL_LIFE,
      seed: Math.random() * 1000,
    });
    if (starTrail.length > STAR_TRAIL_MAX) starTrail.shift();
  }
}

function drawStar(nowMs) {
  if (!star) return;

  // Trail
  for (let i = starTrail.length - 1; i >= 0; i--) {
    const p = starTrail[i];
    p.life -= 1;
    const t = Math.max(0, p.life / STAR_TRAIL_LIFE);
    const a = t * t;
    const flick = 0.85 + 0.15 * Math.sin(nowMs * 0.01 + p.seed);
    fillCircle(p.x, p.y, p.r * flick, "#FFD44A", a * 0.35);
    if (p.life <= 0) starTrail.splice(i, 1);
  }

  if (star.caught) return;

  // Glow
  const pulse = 1 + Math.sin(nowMs * 0.002) * 0.05;
  fillCircle(star.x, star.y, star.r * 2.5 * pulse, "#FFD44A", 0.12);

  // Star shape
  ctx.save();
  ctx.translate(star.x, star.y);
  ctx.rotate(star.t * 1.2);
  ctx.fillStyle = "#FFD44A";
  ctx.beginPath();
  const points = 5;
  const outerR = star.r;
  const innerR = star.r * 0.45;
  let rot = -Math.PI / 2;
  const step = Math.PI / points;
  ctx.moveTo(Math.cos(rot) * outerR, Math.sin(rot) * outerR);
  for (let i = 0; i < points; i++) {
    rot += step;
    ctx.lineTo(Math.cos(rot) * innerR, Math.sin(rot) * innerR);
    rot += step;
    ctx.lineTo(Math.cos(rot) * outerR, Math.sin(rot) * outerR);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// --- Celebration particles ---
let celebrationParticles = [];
let celebrationTimer = 0;

function spawnCelebration(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(40, 180);
    celebrationParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: rand(2, 5),
      life: rand(30, 60),
      maxLife: 60,
      color: ["#FFD44A", "#7CFF5A", "#C9A6FF", "#FF63C6"][Math.floor(Math.random() * 4)],
    });
  }
  celebrationTimer = 90; // frames until reset
}

// --- Input ---
let dragging = false;
let rawX = null, rawY = null;

canvas.addEventListener("pointerdown", (e) => {
  dragging = true;
  canvas.setPointerCapture?.(e.pointerId);
  rawX = e.clientX; rawY = e.clientY;
  player.tx = rawX; player.ty = rawY;
  hintEl.style.opacity = "0";
}, { passive: true });

canvas.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  rawX = e.clientX; rawY = e.clientY;
}, { passive: true });

canvas.addEventListener("pointerup", () => { dragging = false; rawX = null; rawY = null; }, { passive: true });
canvas.addEventListener("pointercancel", () => { dragging = false; rawX = null; rawY = null; }, { passive: true });

// --- State ---
let phase = "planets"; // "planets" | "star" | "celebration"

function reset() {
  createPlanets();
  star = null;
  starTrail = [];
  phase = "planets";
  celebrationParticles = [];
  celebrationTimer = 0;
  player.x = W * 0.5; player.y = H * 0.6;
  player.tx = player.x; player.ty = player.y;
  player.vx = 0; player.vy = 0;
  player.r = 13;
}

// --- Update ---
function update(dt, now) {
  // Smooth input follow
  if (dragging && rawX !== null) {
    const follow = 18;
    const a = 1 - Math.exp(-follow * dt);
    player.tx += (rawX - player.tx) * a;
    player.ty += (rawY - player.ty) * a;
  }

  // Player physics (mass + damping)
  const dx = player.tx - player.x;
  const dy = player.ty - player.y;
  const d = Math.hypot(dx, dy);
  const deadzone = 6;

  if (d > deadzone) {
    const accel = Math.min(1600, d * 12);
    player.vx += (dx / d) * accel * dt;
    player.vy += (dy / d) * accel * dt;
  }

  const maxSpeed = 500;
  const sp = Math.hypot(player.vx, player.vy);
  if (sp > maxSpeed) { player.vx *= maxSpeed / sp; player.vy *= maxSpeed / sp; }

  const damp = Math.exp(-5.0 * dt);
  player.vx *= damp; player.vy *= damp;

  if (d <= deadzone && Math.hypot(player.vx, player.vy) < 5) { player.vx = 0; player.vy = 0; }

  player.x += player.vx * dt;
  player.y += player.vy * dt;
  player.x = clamp(player.x, player.r, W - player.r);
  player.y = clamp(player.y, player.r, H - player.r);

  // Planets
  if (phase === "planets") {
    updatePlanetPositions(dt);

    // Check eating
    for (const p of planets) {
      if (!p.alive) continue;
      if (dist(player.x, player.y, p.x, p.y) < player.r + p.r) {
        p.alive = false;
        eaten++;
        // Gentle growth (capped)
        if (eaten <= 6) player.r = Math.min(22, player.r + p.r * 0.12);
      }
    }

    // All eaten -> spawn star
    if (eaten >= PLANET_COUNT) {
      phase = "star";
      createStar();
    }
  }

  if (phase === "star") {
    updateStar(dt);

    // Check catch
    if (star && !star.caught && dist(player.x, player.y, star.x, star.y) < player.r + star.r) {
      star.caught = true;
      phase = "celebration";
      spawnCelebration(star.x, star.y);
    }
  }

  if (phase === "celebration") {
    celebrationTimer--;
    if (celebrationTimer <= 0) reset();
  }

  // Celebration particles
  for (let i = celebrationParticles.length - 1; i >= 0; i--) {
    const p = celebrationParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life--;
    if (p.life <= 0) celebrationParticles.splice(i, 1);
  }

  // HUD
  if (phase === "planets") {
    hudEl.textContent = `Planeten: ${eaten}/${PLANET_COUNT}`;
  } else if (phase === "star") {
    hudEl.textContent = "Fang den Stern!";
  } else {
    hudEl.textContent = "Geschafft!";
  }
}

// --- Draw ---
function draw(now) {
  ctx.clearRect(0, 0, W, H);
  drawBgStars();

  const t = now * 0.002;

  // Planets
  for (const p of planets) {
    if (!p.alive) continue;

    // Orbit path hint (very subtle)
    ctx.save();
    ctx.strokeStyle = "rgba(201,166,255,0.06)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(p.orbitCx, p.orbitCy, p.orbitRx, p.orbitRy, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    const pulse = 1 + Math.sin(t + p.phase) * 0.04;
    fillCircle(p.x, p.y, p.r * 2.1, "#C9A6FF", 0.10);
    fillCircle(p.x, p.y, p.r * pulse, "#C9A6FF", 0.92);
  }

  // Star
  if (phase === "star" || phase === "celebration") {
    drawStar(now);
  }

  // Player
  const pulse = 1 + Math.sin(t) * 0.06;
  fillCircle(player.x, player.y, player.r * 2.2, "#7CFF5A", 0.12);
  fillCircle(player.x, player.y, player.r * pulse, "#7CFF5A", 0.95);

  // Celebration
  for (const p of celebrationParticles) {
    const a = Math.max(0, p.life / p.maxLife);
    fillCircle(p.x, p.y, p.r * a, p.color, a * 0.8);
  }
}

// --- Loop ---
let last = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt, now);
  draw(now);
  requestAnimationFrame(tick);
}

// --- Init ---
reset();
requestAnimationFrame(tick);

})();
</script>
</body>
</html>
